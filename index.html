<script>
    // Suas credenciais oficiais
    const G_KEY = 'AIzaSyCmHc4wC8ty1NNo9xemC2Yf384QK2T_GrU';
    const G_CX = 'b490562deb2ef44c9'; // Seu ID confirmado

    async function searchImages() {
        const query = document.getElementById('query').value;
        const resultsDiv = document.getElementById('results');
        
        if (!query) return;
        resultsDiv.innerHTML = 'Buscando...';

        // URL para buscar na WEB TODA (após você ligar a chave no painel)
        const url = `https://www.googleapis.com/customsearch/v1?key=${G_KEY}&cx=${G_CX}&q=${encodeURIComponent(query)}&searchType=image&num=15`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.items) {
                resultsDiv.innerHTML = '';
                data.items.forEach(item => {
                    const img = document.createElement('img');
                    img.src = item.link;
                    img.style = "width:32%; margin:1%; border-radius:8px; aspect-ratio:1/1; object-fit:cover;";
                    img.onclick = () => window.open(item.link, '_blank');
                    resultsDiv.appendChild(img);
                });
            } else {
                resultsDiv.innerHTML = "Nada encontrado. Verifique se ativou 'Pesquisar em toda a Web' no painel.";
            }
        } catch (error) {
            resultsDiv.innerHTML = "Erro na API. Verifique sua cota diária.";
        }
    }
</script>
