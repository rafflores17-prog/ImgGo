<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ImgGo - Busca Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
        }

        /* Header Estilo App Premium */
        .header { 
            position: sticky; 
            top: 0; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px);
            padding: 15px; 
            z-index: 100; 
            border-bottom: 1px solid #1e293b;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .logo-area i { color: var(--accent); font-size: 24px; }
        .logo-area h1 { font-size: 20px; margin: 0; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-container {
            display: flex;
            background: #1e293b;
            border-radius: 12px;
            padding: 5px;
            border: 1px solid #334155;
        }

        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            padding: 12px; 
            color: white; 
            outline: none; 
            font-size: 16px; 
        }

        .btn-search { 
            background: var(--accent); 
            border: none; 
            width: 50px; 
            border-radius: 10px; 
            color: #020617; 
            cursor: pointer; 
        }

        /* Grade de Imagens (3 Colunas) */
        #results { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 2px; 
            padding: 2px; 
        }

        .img-card { 
            aspect-ratio: 1 / 1; 
            background: #0f172a; 
            overflow: hidden; 
            position: relative;
        }

        .img-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.3s;
        }

        .img-card:active img { transform: scale(0.95); }

        /* Modal de Visualização */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 1000; 
            overflow-y: auto; 
        }

        .modal-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
        }

        .full-img { width: 100%; max-height: 80vh; object-fit: contain; }

        .action-buttons {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            gap: 10px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-download { background: #38bdf8; color: #020617; }
        .btn-share { background: #1e293b; color: white; border: 1px solid #334155; }

        .related-section { padding: 10px; }
        .related-title { font-size: 14px; color: var(--accent); margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-area">
            <i class="fa-solid fa-magnifying-glass-chart"></i>
            <h1>ImgGo</h1>
        </div>
        <div class="search-container">
            <input type="text" id="query" placeholder="O que você procura?">
            <button class="btn-search" onclick="searchImages()">
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="results"></div>

    <div id="imgModal" class="modal">
        <div class="modal-header">
            <span onclick="closeModal()"><i class="fa-solid fa-xmark"></i> Fechar</span>
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>
        <img id="modalImg" class="full-img">
        
        <div class="action-buttons">
            <button class="btn-action btn-download" onclick="downloadActiveImg()">
                <i class="fa-solid fa-download"></i> Salvar
            </button>
            <button class="btn-action btn-share" onclick="shareActiveImg()">
                <i class="fa-solid fa-share-nodes"></i> Enviar
            </button>
        </div>

        <div class="related-section">
            <div class="related-title"><i class="fa-solid fa-layer-group"></i> Imagens Relacionadas</div>
            <div id="relatedResults" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;"></div>
        </div>
    </div>

    <script>
        const GOOGLE_API_KEY = 'AIzaSyCmHc4wC8ty1NNo9xemC2Yf384QK2T_GrU'; 
        const GOOGLE_CX_ID = 'b490562deb2ef44c9'; 
        const PIXABAY_KEY = '55230728-13cd2e9dbc50bb6c060ad78f0';

        let currentImgUrl = '';

        async function searchImages(customQuery = null, isRelated = false) {
            const query = customQuery || document.getElementById('query').value;
            const targetDiv = isRelated ? document.getElementById('relatedResults') : document.getElementById('results');
            
            if (!query) return;
            if(!isRelated) targetDiv.innerHTML = '<div style="grid-column: 1/-1; padding:20px; text-align:center;">Buscando...</div>';

            try {
                const res = await fetch(`https://www.googleapis.com/customsearch/v1?key=${GOOGLE_API_KEY}&cx=${GOOGLE_CX_ID}&q=${encodeURIComponent(query)}&searchType=image&num=18`);
                const data = await res.json();

                if (!data.items || res.status !== 200) {
                    return searchPixabay(query, targetDiv);
                }
                renderResults(data.items, targetDiv);
            } catch (e) { searchPixabay(query, targetDiv); }
        }

        async function searchPixabay(query, targetDiv) {
            try {
                const res = await fetch(`https://pixabay.com/api/?key=${PIXABAY_KEY}&q=${encodeURIComponent(query)}&image_type=photo&per_page=18`);
                const data = await res.json();
                const formatted = data.hits.map(img => ({ link: img.largeImageURL, title: img.tags }));
                renderResults(formatted, targetDiv);
            } catch (e) { targetDiv.innerHTML = '<p>Erro ao carregar.</p>'; }
        }

        function renderResults(items, targetDiv) {
            targetDiv.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'img-card';
                card.innerHTML = `<img src="${item.link}" loading="lazy" onclick="openModal('${item.link}', '${item.title.replace(/'/g, "")}')">`;
                targetDiv.appendChild(card);
            });
        }

        function openModal(url, title) {
            currentImgUrl = url;
            document.getElementById('modalImg').src = url;
            document.getElementById('imgModal').style.display = "block";
            searchImages(title, true);
        }

        function closeModal() { document.getElementById('imgModal').style.display = "none"; }
        
        function downloadActiveImg() { window.open(currentImgUrl, '_blank'); }

        async function shareActiveImg() {
            if (navigator.share) {
                navigator.share({ title: 'ImgGo', url: currentImgUrl });
            } else { alert('Link: ' + currentImgUrl); }
        }
    </script>
</body>
</html>
